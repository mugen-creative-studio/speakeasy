name: Release

# Publishes every @speakeasy/* workspace to npm when a v* tag is pushed, using
# GitHub Actions OIDC trusted publishing: no npm token is ever stored, so there
# is nothing to steal. Provenance is generated automatically because the repo
# and packages are public.
#
# One-time bootstrap: a trusted publisher is configured in each package's
# npmjs.com settings, which requires the package to already exist. Publish the
# first version of each package manually (npm login + 2FA), then register this
# repo + workflow as a Trusted Publisher for each package. After that, tag
# pushes publish here with no secrets. See RELEASING.md.
on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC: exchanged for a short-lived npm publish token
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22 # trusted publishing needs Node >= 22.14
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      # Trusted publishing needs npm >= 11.5.1; Node 22 still ships npm 10.
      - name: Upgrade npm
        run: npm install -g npm@latest

      - run: npm ci

      - name: Tag matches package version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$PKG" ]; then
            echo "Tag v$TAG does not match package.json version $PKG" >&2
            exit 1
          fi

      - run: npm run format:check
      - run: npm test

      # OIDC trusted publishing: no NODE_AUTH_TOKEN. Provenance is automatic
      # under OIDC (--provenance is explicit intent). --ignore-scripts avoids
      # running any lifecycle scripts during the sensitive publish step.
      - name: Publish workspaces
        run: npm publish --workspaces --provenance --ignore-scripts
